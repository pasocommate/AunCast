name: Build Release

on: 
  workflow_dispatch:

jobs:

  # Validate Repository Configuration
  config:
    runs-on: ubuntu-latest
    outputs:
      config_package: ${{ steps.config_package.outputs.configPackage }}
    steps:

    # Ensure that required repository variable has been created for the Package
    - name: Validate Package Config
      id: config_package
      run: |
        if [ "${{ vars.PACKAGE_NAME }}" != "" ]; then
          echo "configPackage=true" >> $GITHUB_OUTPUT;
        else
          echo "configPackage=false" >> $GITHUB_OUTPUT;
        fi

  # Build and release the Package
  # If the repository is not configured properly, this job will be skipped
  build:
    needs: config
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      packagePath: Packages/${{ vars.PACKAGE_NAME }}
      listingRepository: ${{ vars.VPM_LISTING_REPOSITORY }}
      listingWorkflow: ${{ vars.VPM_LISTING_WORKFLOW }}
      listingRef: ${{ vars.VPM_LISTING_REF }}
      listingToken: ${{ secrets.VPM_LISTING_REPO_TOKEN }}
    if: needs.config.outputs.config_package == 'true'
    steps:

      # Checkout Local Repository
      - name: Checkout
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac

      # Get the Package version based on the package.json file
      - name: Get Version
        id: version
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with: 
            file_path: "${{ env.packagePath }}/package.json"
            prop_path: "version"
    
      # Configure the Environment Variables needed for releasing the Package
      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}".zip >> $GITHUB_ENV
          echo "unityPackage=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.unitypackage" >> $GITHUB_ENV
          echo "version=${{ steps.version.outputs.value }}" >> $GITHUB_ENV

      # Zip the Package for release
      - name: Create Package Zip
        working-directory: "${{ env.packagePath }}"
        run: zip -r "${{ github.workspace }}/${{ env.zipFile }}" .
      
      # Build a list of .meta files for future use
      - name: Track Package Meta Files
        run: find "${{ env.packagePath }}/" -name \*.meta >> metaList
      
      # Make a UnityPackage version of the Package for release
      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList
      
      # Make a release tag of the version from the package.json file 
      - name: Create Tag
        id: tag_version
        uses: rickstaa/action-create-tag@88dbf7ff6fe2405f8e8f6c6fdfd78829bc631f83
        with:
          tag: "${{ env.version }}"
      
      # Publish the Release to GitHub
      - name: Make Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            ${{ env.packagePath }}/package.json
          tag_name: ${{ env.version }}

      - name: Trigger vpm-listing workflow
        if: env.listingRepository != '' && env.listingToken != ''
        uses: actions/github-script@v7
        env:
          LISTING_REPOSITORY: ${{ env.listingRepository }}
          LISTING_WORKFLOW: ${{ env.listingWorkflow }}
          LISTING_REF: ${{ env.listingRef }}
        with:
          github-token: ${{ env.listingToken }}
          script: |
            const repository = process.env.LISTING_REPOSITORY;
            const [owner, repo] = repository.split("/");
            if (!owner || !repo) {
              core.setFailed(`VPM_LISTING_REPOSITORY format is invalid: ${repository}`);
              return;
            }

            const workflow_id = process.env.LISTING_WORKFLOW || "build-listing.yml";
            const ref = process.env.LISTING_REF || "main";

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref
            });

            core.info(`Dispatched ${workflow_id} on ${owner}/${repo} (${ref})`);

      - name: Skip vpm-listing dispatch
        if: env.listingRepository == '' || env.listingToken == ''
        run: |
          echo "::notice::Skip remote listing dispatch. Set VPM_LISTING_REPOSITORY variable and VPM_LISTING_REPO_TOKEN secret to enable it."
